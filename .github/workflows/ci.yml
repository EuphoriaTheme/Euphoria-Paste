name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  build-and-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Security audit (production deps)
        run: npm audit --omit=dev
