<!doctype html>
<html lang="en">
  <head>
    <title>Euphoria Development | Paste</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="solarized_dark.css" />
    <link rel="stylesheet" type="text/css" href="application.css" />
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jquery/1.12.4/jquery.min.js"
      referrerpolicy="no-referrer"
      defer
    ></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="highlight.min.js" defer></script>
    <script src="application.js" defer></script>
    <script src="bootstrap.js" defer></script>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <script src="https://unpkg.com/@popperjs/core@2" defer></script>
    <script src="https://unpkg.com/tippy.js@6" defer></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/tippy.js@6/themes/dark.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <meta name="robots" content="noindex,nofollow" />
  </head>

  <body>
    <ul id="messages"></ul>

    <div id="key">
      <div id="pointer" style="display: none"></div>
      <div id="box1">
        <img src="logo.png" alt="Logo" class="logo" />
      </div>
      <div id="box2">
        <button class="save function button-picture">
          <i class="fa fa-save"></i>
        </button>
        <button class="new function button-picture">
          <i class="fa fa-file"></i>
        </button>
        <button class="duplicate function button-picture">
          <i class="fa fa-copy"></i>
        </button>
        <button class="raw function button-picture">
          <i class="fa fa-file-alt"></i>
        </button>
        <button class="discord function button-picture">
          <i class="fa-brands fa-discord"></i>
        </button>
      </div>
      <div id="box3" style="display: none">
        <div class="label"></div>
        <div class="shortcut"></div>
      </div>
    </div>

    <div id="linenos"></div>
    <pre
      id="box"
      style="display: none"
      class="hljs"
      tabindex="0"
    ><code></code></pre>
    <textarea spellcheck="false" style="display: none"></textarea>

    <!-- Add this after the textarea -->
    <div id="stats-container">
      <span id="line-count">Lines: 0</span>
      <span id="word-count">Words: 0</span>
      <span id="char-count">Characters: 0</span>
    </div>

    <!-- Floating Action Buttons for Mobile -->
    <div id="mobile-controls">
      <button id="save-btn" class="fab save" data-tippy-content="Save">
        <i class="fa fa-save"></i>
      </button>
      <button id="new-btn" class="fab new" data-tippy-content="New Document">
        <i class="fa fa-file"></i>
      </button>
      <button
        id="duplicate-btn"
        class="fab duplicate"
        data-tippy-content="Duplicate"
      >
        <i class="fa fa-copy"></i>
      </button>
      <button id="raw-btn" class="fab raw" data-tippy-content="View Raw">
        <i class="fa fa-file-alt"></i>
      </button>
      <button
        id="discord-btn"
        class="fab discord"
        data-tippy-content="Support Discord"
      >
        <i class="fa-brands fa-discord"></i>
      </button>
    </div>
  </body>
</html>
